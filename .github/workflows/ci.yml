name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: quotebot
          POSTGRES_PASSWORD: quotebot
          POSTGRES_DB: quotebot_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://quotebot:quotebot@localhost:5432/quotebot_db
      JWT_SECRET: ci-test-jwt-secret-32chars-minimum
      JWT_EXPIRATION: 24h
      JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars
      JWT_REFRESH_EXPIRATION: 14d
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      API_PORT: 3001
      API_PREFIX: api
      CORS_ORIGIN: http://localhost:3000
      INTERNAL_API_KEY: ci-internal-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push database schema
        run: npx prisma db push --accept-data-loss

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --forceExit --passWithNoTests

  frontend:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false
