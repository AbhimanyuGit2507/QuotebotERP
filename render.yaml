services:
  # PostgreSQL Database
  - type: pserv
    name: quotebot-db
    env: docker
    plan: free
    region: singapore
    databases:
      - name: quotebot_db
        user: postgres

  # Backend API
  - type: web
    name: quotebot-backend
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: quotebot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: AUTO_EMAIL_SYNC_ENABLED
        value: true
      - key: AUTO_SEND_QUOTATION
        value: true
      - key: BACKEND_RFQ_PIPELINE_ENABLED
        value: true

  # Frontend Static Site
  - type: web
    name: quotebot-frontend
    env: static
    region: singapore
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://quotebot-backend.onrender.com/api
